# ===================================================================
# CORS CONFIGURATION - Simplified for Nginx Reverse Proxy
# ===================================================================
# Since all requests come through Nginx reverse proxy on the same domain,
# CORS is no longer needed. However, we keep minimal configuration for:
# 1. Development flexibility (direct backend access if needed)
# 2. Health check endpoints
# Note: With Nginx proxying, requests appear from same origin (no CORS needed)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===================================================================
# Reverse Proxy Headers Configuration
# ===================================================================
# Tell Spring Boot to respect X-Forwarded-* headers from Nginx
server.use-forward-headers=true

# ===================================================================
# HIKARI CP CONFIGURATION (unchanged)
# ===================================================================
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
