# ===================================================================
# Extract subdomain variable (Phải nằm ngoài khối server)
# ===================================================================
map $host $sub_extract {
    # Sử dụng tên biến nội bộ p_sub để tránh xung đột
    ~^(?P<p_sub>[^.]+)\.mydomain\.com$ $p_sub;
    default "";
}

# ===================================================================
# Main Server Block
# ===================================================================
server {
    listen 80;
    listen [::]:80;

    # Thay đổi mydomain.com thành domain thật của bạn hoặc để _ nếu dùng mặc định của Render
    server_name mydomain.com *.mydomain.com;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory for frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # ===================================================================
    # API Proxy Configuration
    # ===================================================================
    location /api/ {
        proxy_pass https://mockapi-5k55.onrender.com/api/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Forwarding Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Gửi subdomain đã trích xuất vào header cho Backend
        proxy_set_header X-Subdomain $sub_extract;

        # SSL Settings cho Backend HTTPS
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===================================================================
    # Frontend Static Files - SPA Routing
    # ===================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Don't cache HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}