# ===================================================================
# Extract subdomain variable (Phải nằm ngoài khối server)
# ===================================================================
map $host $sub_extract {
    ~^(?P<p_sub>[^.]+)\.dangthanhhieu076\.id\.vn$ $p_sub;
    default "";
}

# ===================================================================
# Main Server Block - Frontend & API Management
# ===================================================================
server {
    listen 80;
    listen [::]:80;

    # Cấu hình domain chính
    server_name dangthanhhieu076.id.vn www.dangthanhhieu076.id.vn;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory cho frontend
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # ===================================================================
    # 1. Auth Proxy (Dành cho Login/Register)
    # ===================================================================
    location /auth/ {
        proxy_pass https://mockapi-5k55.onrender.com/auth/;
        proxy_set_header Host mockapi-5k55.onrender.com;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # ===================================================================
    # 2. Quản lý Subdomain & Mock APIs (Khớp với @RequestMapping)
    # ===================================================================
    # Khớp với SubdomainController (/subdomains/...)
    location /subdomains/ {
        proxy_pass https://mockapi-5k55.onrender.com/subdomains/;
        proxy_set_header Host mockapi-5k55.onrender.com;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Khớp với MockApiController (/apis/...)
    location /apis/ {
        proxy_pass https://mockapi-5k55.onrender.com/apis/;
        proxy_set_header Host mockapi-5k55.onrender.com;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
    
    # ===================================================================
    # Frontend Static Files - SPA Routing
    # ===================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Health check cho Render
    location /health {
        access_log off;
        return 200 'OK';
    }
}

# ===================================================================
# Wildcard Subdomain Server - Mock API Proxy
# ===================================================================
# Xử lý các request đến subdomain (ví dụ: test.dangthanhhieu076.id.vn/api/users GET)
server {
    listen 80;
    listen [::]:80;

    # Bắt tất cả các subdomain của dangthanhhieu076.id.vn
    server_name *.dangthanhhieu076.id.vn;

    # Chỉ xử lý các request Mock API (bắt đầu bằng /)
    location / {
        # Proxy toàn bộ request sang backend
        # Backend sẽ nhận: subdomain, path, method, user info từ headers
        proxy_pass https://mockapi-5k55.onrender.com;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Giữ nguyên Host header để backend nhận biết subdomain
        proxy_set_header Host $host;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Truyền subdomain cho backend xử lý
        proxy_set_header X-Subdomain $sub_extract;
        
        # Truyền thông tin path và method gốc
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;

        # SSL Settings
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

