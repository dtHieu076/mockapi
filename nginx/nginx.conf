# ===================================================================
# Extract subdomain variable (Phải nằm ngoài khối server)
# ===================================================================
map $host $sub_extract {
    ~^(?P<p_sub>[^.]+)\.mydomain\.com$ $p_sub;
    default "";
}

# ===================================================================
# Main Server Block
# ===================================================================
server {
    listen 80;
    listen [::]:80;

    # Cấu hình domain
    server_name mydomain.com *.mydomain.com;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory cho frontend
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # ===================================================================
    # API Proxy Configuration
    # ===================================================================
    location /api/ {
        proxy_pass https://mockapi-5k55.onrender.com/api/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Forwarding Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;

        # SSL Settings
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===================================================================
    # Auth Proxy Configuration - Fix 405 Method Not Allowed
    # ===================================================================
    location /auth/ {
        proxy_pass https://mockapi-5k55.onrender.com/auth/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Forwarding Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;

        # SSL Settings
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===================================================================
    # Frontend Static Files - SPA Routing
    # ===================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Health check cho Render
    location /health {
        access_log off;
        return 200 'OK';
    }
}