# ===================================================================
# Nginx Configuration for MockAPI
# ===================================================================
# Features:
# - Wildcard subdomain support (mydomain.com, *.mydomain.com)
# - SPA routing with try_files
# - API proxy to backend
# - Proper Host header forwarding
# ===================================================================

# ===================================================================
# HTTP Server - Redirect to HTTPS (uncomment for HTTPS)
# ===================================================================
# server {
#     listen 80;
#     server_name mydomain.com *.mydomain.com;
#     return 301 https://$server_name$request_uri;
# }

# ===================================================================
# Main Server Block
# ===================================================================
server {
    # ===================================================================
    # Listen on port 80
    # ===================================================================
    listen 80;
    listen [::]:80;

    # ===================================================================
    # Wildcard domain configuration
    # ===================================================================
    server_name mydomain.com *.mydomain.com;

    # ===================================================================
    # Security Headers
    # ===================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===================================================================
    # Root directory for frontend static files
    # ===================================================================
    root /usr/share/nginx/html;
    index index.html;

    # ===================================================================
    # Gzip Compression
    # ===================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # ===================================================================
    # API Proxy Configuration
    # ===================================================================
    # Proxy all /api requests to the backend Spring Boot service
    location /api/ {
        # ===================================================================
        # Backend service URL (private/internal service on Render)
        # ===================================================================
        proxy_pass http://mockapi-backend:8080/api/;

        # ===================================================================
        # HTTP/1.1 and Keep-alive
        # ===================================================================
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ===================================================================
        # Forward Host header (critical for subdomain detection)
        # ===================================================================
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # ===================================================================
        # Subdomain forwarding (for backend subdomain detection)
        # ===================================================================
        proxy_set_header X-Subdomain $subdomain;

        # ===================================================================
        # Timeouts
        # ===================================================================
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ===================================================================
        # Buffering
        # ===================================================================
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ===================================================================
    # WebSocket Support (if needed for future)
    # ===================================================================
    location /ws/ {
        proxy_pass http://mockapi-backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===================================================================
    # Frontend Static Files - SPA Routing
    # ===================================================================
    location / {
        # ===================================================================
        # Try to serve the file directly, then fallback to index.html for SPA
        # ===================================================================
        try_files $uri $uri/ /index.html;

        # ===================================================================
        # Cache static assets
        # ===================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ===================================================================
        # Don't cache HTML (for SPA routing)
        # ===================================================================
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ===================================================================
    # Health check endpoint
    # ===================================================================
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ===================================================================
    # Error pages
    # ===================================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ===================================================================
# Extract subdomain variable (optional advanced configuration)
# ===================================================================
# This can be used for more complex subdomain-based routing
map $host $subdomain {
    host_regex ^(?P<subdomain>[^.]+)\.mydomain\.com$ $subdomain;
    default "";
}
