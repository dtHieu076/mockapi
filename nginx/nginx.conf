# ===================================================================
# Extract subdomain variable (Phải nằm ngoài khối server)
# ===================================================================
map $host $sub_extract {
    ~^(?P<p_sub>[^.]+)\.dangthanhhieu076\.id\.vn$ $p_sub;
    default "";
}

# ===================================================================
# Main Server Block
# ===================================================================
server {
    listen 80;
    listen [::]:80;

    # Cấu hình domain - hỗ trợ id.vn và các domain khác
    server_name dangthanhhieu076.id.vn *.dangthanhhieu076.id.vn;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory cho frontend
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # ===================================================================
    # 1. Auth Proxy (Dành cho Login/Register)
    # ===================================================================
    location /auth/ {
        proxy_pass https://mockapi-5k55.onrender.com/auth/;
        proxy_set_header Host mockapi-5k55.onrender.com;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # ===================================================================
    # 2. Quản lý Subdomain & Mock APIs (Khớp với @RequestMapping)
    # ===================================================================
    # Khớp với SubdomainController (/subdomains/...)
    location /subdomains/ {
        proxy_pass https://mockapi-5k55.onrender.com/subdomains/;
        proxy_set_header Host mockapi-5k55.onrender.com;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Khớp với MockApiController (/apis/...)
    location /apis/ {
        proxy_pass https://mockapi-5k55.onrender.com/apis/;
        proxy_set_header Host mockapi-5k55.onrender.com;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }
    
    # ===================================================================
    # Frontend Static Files - SPA Routing
    # ===================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Health check cho Render
    location /health {
        access_log off;
        return 200 'OK';
    }
}