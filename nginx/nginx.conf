# ===================================================================
# Extract subdomain variable (Phải nằm ngoài khối server)
# ===================================================================
map $host $sub_extract {
    ~^(?P<p_sub>[^.]+)\.dangthanhhieu076\.id\.vn$ $p_sub;
    default "";
}

# ===================================================================
# Main Server Block
# ===================================================================
server {
    listen 80;
    listen [::]:80;

    # Cấu hình domain - hỗ trợ id.vn và các domain khác
    server_name dangthanhhieu076.id.vn *.dangthanhhieu076.id.vn;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory cho frontend
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # ===================================================================
    # API & Auth Proxy Configuration - FIXED FOR RENDER FREE TIER
    # ===================================================================
    location /api/ {
        proxy_pass https://mockapi-5k55.onrender.com/api/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # THAY ĐỔI QUAN TRỌNG: Không dùng $host, dùng $proxy_host
        # Điều này giúp Render định tuyến đúng vào Backend thay vì quay lại Nginx
        proxy_set_header Host mockapi-5k55.onrender.com; 
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Vẫn giữ Subdomain để Spring Boot xử lý logic
        proxy_set_header X-Subdomain $sub_extract;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /auth/ {
        proxy_pass https://mockapi-5k55.onrender.com/auth/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Tương tự như trên: Điền chính xác domain của Backend vào đây
        proxy_set_header Host mockapi-5k55.onrender.com;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
    
    # ===================================================================
    # Frontend Static Files - SPA Routing
    # ===================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Health check cho Render
    location /health {
        access_log off;
        return 200 'OK';
    }
}