# ===================================================================
# Extract subdomain variable (phải nằm ngoài server block)
# ===================================================================
map $host $sub_extract {
    ~^(?P<p_sub>[^.]+)\.dangthanhhieu076\.id\.vn$ $p_sub;
    default "";
}

# ===================================================================
# MAIN DOMAIN SERVER
# Frontend + Auth + API management
# ===================================================================
server {
    listen 80;
    listen [::]:80;

    server_name dangthanhhieu076.id.vn www.dangthanhhieu076.id.vn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # ===============================
    # AUTH
    # ===============================
    location /auth/ {
        proxy_pass https://mockapi-5k55.onrender.com/auth/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # QUAN TRỌNG: không dùng $host
        proxy_set_header Host mockapi-5k55.onrender.com;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # ===============================
    # SUBDOMAIN MANAGEMENT
    # ===============================
    location /subdomains/ {
        proxy_pass https://mockapi-5k55.onrender.com/subdomains/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host mockapi-5k55.onrender.com;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # ===============================
    # API MANAGEMENT
    # ===============================
    location /apis/ {
        proxy_pass https://mockapi-5k55.onrender.com/apis/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host mockapi-5k55.onrender.com;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # ===============================
    # DATABASE MANAGEMENT
    # ===============================
    # Xử lý cả /api/databases và /api/databases/
    location /api/databases {
        # Thêm / để tránh redirect 301 từ Nginx
        rewrite ^/api/databases(/.*)?$ /api/databases$1/ break;
        proxy_pass https://mockapi-5k55.onrender.com/api/databases/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host mockapi-5k55.onrender.com;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $sub_extract;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }


    # Xử lý cả /api/databases và /api/databases/ mà không bị 301
    location ~ ^/api/databases(?<rest>/.*)?$ {
        # Chuyển tiếp đến backend, giữ nguyên phần path phía sau nếu có
        proxy_pass https://mockapi-5k55.onrender.com/api/databases$rest;
    
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host mockapi-5k55.onrender.com;
    
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # QUAN TRỌNG: Ép cứng https để trình duyệt không chặn Mixed Content
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Subdomain $sub_extract;
    
        # CHỐNG LỖI 301: Tắt tự động redirect của Nginx
        proxy_redirect off;
    
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # ===============================
    # FRONTEND SPA
    # ===============================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
    }
}

# ===================================================================
# WILDCARD SUBDOMAIN SERVER
# test.dangthanhhieu076.id.vn/anything
# ===================================================================
server {
    listen 80;
    listen [::]:80;

    server_name *.dangthanhhieu076.id.vn;

    location / {
        proxy_pass https://mockapi-5k55.onrender.com;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # QUAN TRỌNG: Không dùng $host
        proxy_set_header Host mockapi-5k55.onrender.com;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # truyền subdomain cho backend xử lý
        proxy_set_header X-Subdomain $sub_extract;

        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}